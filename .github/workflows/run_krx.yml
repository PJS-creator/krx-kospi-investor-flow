name: Fetch KOSPI investor flow from KRX

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: "조회 시작일 (YYYYMMDD)"
        required: true
        default: "20250801"
      end_date:
        description: "조회 종료일 (YYYYMMDD)"
        required: true
        default: "20260306"

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install packages
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run downloader
        env:
          START_DATE: ${{ inputs.start_date }}
          END_DATE: ${{ inputs.end_date }}
        run: python fetch_krx_kospi_investor_flow.py

      - name: Upload result files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: krx-kospi-investor-flow-${{ inputs.start_date }}-${{ inputs.end_date }}
          path: output/
          retention-days: 30
